<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Cyber-Node</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* CONTACT SECTION */

.contact-section{
padding:120px 20px;
text-align:center;
background:linear-gradient(135deg,#1e3a8a,#020617);
}

.contact-container{
max-width:700px;
margin:auto;
background:#0f1f3d;
padding:50px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.contact-container h1{
margin-bottom:10px;
}

.contact-container p{
margin-bottom:30px;
opacity:0.8;
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:14px;
border-radius:6px;
border:none;
font-size:15px;
}

.contact-form textarea{
min-height:120px;
resize:none;
}

.contact-form button{
background:#2D8FE3;
border:none;
padding:14px;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
background:#1c6fc4;
}

</style>

</head>

<body>

<!-- CONTACT -->

<section class="contact-section">

<div class="contact-container">

<h1>Contact Cyber-Node</h1>

<p>Phone: 253-374-9087</p>

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<textarea placeholder="How can we help?" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

</body>

</html>
