<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Cyber-Node Security Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1f38;
    --bg2: #142840;
    --border: #2e5070;
    --accent: #00d4ff;
    --text: #e8f4ff;
    --muted: #90bcd8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* --- HERO & BACKGROUND --- */
  .hero-wrap {
    position: relative;
    padding: 160px 20px 60px;
    text-align: center;
    background: linear-gradient(180deg, #1a3252 0%, #0e1f38 100%);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 45px 45px;
    mask-image: radial-gradient(circle, black, transparent 85%);
  }

  .hero-content { position: relative; z-index: 2; }
  .hero-content h1 { font-size: 48px; letter-spacing: -1px; margin-bottom: 10px; }
  .hero-content p { font-family: var(--mono); color: var(--muted); }

  /* --- CONTACT FORM MODULE --- */
  .contact-section {
    max-width: 800px;
    margin: 0 auto 100px;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }

  .contact-container {
    background: rgba(20, 40, 64, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 50px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .info-header {
    text-align: center;
    margin-bottom: 40px;
    font-family: var(--mono);
  }

  .info-header .email-link {
    color: var(--accent);
    font-size: 18px;
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }

  /* --- CYBER FORM FIELDS --- */
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .contact-form input,
  .contact-form textarea {
    background: rgba(14, 31, 56, 0.8);
    border: 1px solid var(--border);
    padding: 15px;
    color: white;
    font-family: var(--mono);
    font-size: 14px;
    border-radius: 4px;
    transition: 0.3s;
  }

  .contact-form input:focus,
  .contact-form textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  .contact-form textarea {
    min-height: 140px;
    resize: vertical;
  }

  /* --- SUBMIT BUTTON --- */
  .cn-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 18px;
    font-family: var(--mono);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  .cn-btn:hover {
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
    transform: translateY(-2px);
  }

  @media (max-width: 600px) {
    .contact-container { padding: 30px 20px; }
    .hero-content h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<div id="navbar"></div>

<section class="hero-wrap">
  <div class="grid-lines"></div>
  <div class="hero-content">
    <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 5px; margin-bottom: 10px;">[ COMMS_ESTABLISHED ]</div>
    <h1>Initialize <span>Contact</span></h1>
    <p>Reach out to our intelligence team for security assessments and consultation.</p>
  </div>
</section>

<section class="contact-section">
  <div class="contact-container">
    <div class="info-header">
      <p style="margin-bottom: 5px;">DIRECT_UPLINK:</p>
      <a href="mailto:sales@cyber-node.com" class="email-link">sales@cyber-node.com</a>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <label>Identity_Name</label>
        <input type="text" placeholder="ENTER FULL NAME" required>
      </div>

      <div class="form-group">
        <label>Return_Email_Address</label>
        <input type="email" placeholder="USER@DOMAIN.COM" required>
      </div>

      <div class="form-group">
        <label>Message_Payload</label>
        <textarea placeholder="DESCRIBE YOUR INQUIRY..."></textarea>
      </div>

      <button type="submit" class="cn-btn">Transmit Message</button>
    </form>
  </div>
</section>

<div id="footer"></div>

<script>
  // Navbar loader
  fetch("components/navbar.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("navbar").innerHTML = html; })
    .catch(e => console.error("Nav Error:", e));

  // Footer loader
  fetch("components/footer.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("footer").innerHTML = html; })
    .catch(e => console.error("Footer Error:", e));
</script>

</body>
</html>
