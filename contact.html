<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Cyber-Node Security Intelligence</title>
<meta name="description" content="Contact Cyber-Node's security intelligence team for assessments, pen-testing, and compliance consultations.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1f38;
    --bg2: #142840;
    --border: #2e5070;
    --accent: #00d4ff;
    --text: #e8f4ff;
    --muted: #90bcd8;
    --success: #00ff88;
    --error: #ff4444;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .hero-wrap {
    position: relative;
    padding: 160px 20px 60px;
    text-align: center;
    background: linear-gradient(180deg, #1a3252 0%, #0e1f38 100%);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 45px 45px;
    mask-image: radial-gradient(circle, black, transparent 85%);
  }

  .hero-content { position: relative; z-index: 2; }
  .hero-content h1 { font-size: 48px; letter-spacing: -1px; margin-bottom: 10px; }
  .hero-content p { font-family: var(--mono); color: var(--muted); }

  .contact-section {
    max-width: 800px;
    margin: 0 auto 100px;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }

  .contact-container {
    background: rgba(20, 40, 64, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 50px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .info-header {
    text-align: center;
    margin-bottom: 40px;
    font-family: var(--mono);
  }

  .info-header .email-link {
    color: var(--accent);
    font-size: 18px;
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .contact-form input,
  .contact-form textarea {
    background: rgba(14, 31, 56, 0.8);
    border: 1px solid var(--border);
    padding: 15px;
    color: white;
    font-family: var(--mono);
    font-size: 14px;
    border-radius: 4px;
    transition: 0.3s;
  }

  .contact-form input:focus,
  .contact-form textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  .contact-form textarea {
    min-height: 140px;
    resize: vertical;
  }

  .cn-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 18px;
    font-family: var(--mono);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    position: relative;
  }

  .cn-btn:hover:not(:disabled) {
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
    transform: translateY(-2px);
  }

  .cn-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Status messages */
  .form-status {
    display: none;
    font-family: var(--mono);
    font-size: 13px;
    padding: 15px 20px;
    border-radius: 4px;
    text-align: center;
    letter-spacing: 1px;
  }

  .form-status.success {
    display: block;
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid var(--success);
    color: var(--success);
  }

  .form-status.error {
    display: block;
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid var(--error);
    color: var(--error);
  }

  /* Honeypot — hidden from real users, catches bots */
  .bot-trap { display: none; }

  @media (max-width: 600px) {
    .contact-container { padding: 30px 20px; }
    .hero-content h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<div id="navbar"></div>

<section class="hero-wrap">
  <div class="grid-lines"></div>
  <div class="hero-content">
    <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 5px; margin-bottom: 10px;">[ COMMS_ESTABLISHED ]</div>
    <h1>Initialize <span>Contact</span></h1>
    <p>Reach out to our intelligence team for security assessments and consultation.</p>
  </div>
</section>

<section class="contact-section">
  <div class="contact-container">
    <div class="info-header">
      <p style="margin-bottom: 5px;">DIRECT_UPLINK:</p>
      <a href="mailto:sales@cyber-node.com" class="email-link">sales@cyber-node.com</a>
    </div>

    <form class="contact-form" id="contactForm">
      <!-- Web3Forms access key — replace with yours from web3forms.com -->
      <input type="hidden" name="access_key" value="59d2f31e-d9a6-4f5e-8687-c4f7147bd2fa">
      <!-- Custom subject line in the email you receive -->
      <input type="hidden" name="subject" value="New Cyber-Node Inquiry">
      <!-- Redirect after success (optional — we handle it in JS instead) -->
      <input type="hidden" name="redirect" value="false">

      <!-- Honeypot spam trap -->
      <input type="text" name="botcheck" class="bot-trap" tabindex="-1" autocomplete="off">

      <div class="form-group">
        <label for="name">Identity_Name</label>
        <input type="text" id="name" name="name" placeholder="ENTER FULL NAME" required>
      </div>

      <div class="form-group">
        <label for="email">Return_Email_Address</label>
        <input type="email" id="email" name="email" placeholder="USER@DOMAIN.COM" required>
      </div>

      <div class="form-group">
        <label for="message">Message_Payload</label>
        <textarea id="message" name="message" placeholder="DESCRIBE YOUR INQUIRY..."></textarea>
      </div>

      <div class="form-status" id="formStatus"></div>

      <button type="submit" class="cn-btn" id="submitBtn">Transmit Message</button>
    </form>
  </div>
</section>

<div id="footer"></div>

<script>
  // Navbar loader
  fetch("components/navbar.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("navbar").innerHTML = html; })
    .catch(e => console.error("Nav Error:", e));

  // Footer loader
  fetch("components/footer.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("footer").innerHTML = html; })
    .catch(e => console.error("Footer Error:", e));

  // ── FORM SUBMISSION ──────────────────────────────────────────
  const form = document.getElementById("contactForm");
  const btn = document.getElementById("submitBtn");
  const status = document.getElementById("formStatus");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    btn.disabled = true;
    btn.textContent = "TRANSMITTING...";
    status.className = "form-status";
    status.style.display = "none";

    const data = new FormData(form);

    try {
      const res = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        body: data
      });

      const json = await res.json();

      if (json.success) {
        status.textContent = "// TRANSMISSION SUCCESSFUL — WE'LL BE IN TOUCH SHORTLY";
        status.className = "form-status success";
        form.reset();
        btn.textContent = "MESSAGE SENT ✓";
      } else {
        throw new Error(json.message || "Submission failed");
      }
    } catch (err) {
      status.textContent = "// TRANSMISSION FAILED — PLEASE EMAIL sales@cyber-node.com DIRECTLY";
      status.className = "form-status error";
      btn.disabled = false;
      btn.textContent = "Transmit Message";
    }
  });
</script>

</body>
</html>
