<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Intelligence Blog | Cyber-Node</title>
<meta name="description" content="Threat intelligence, CVE alerts, compliance guides, and cybersecurity how-tos from the Cyber-Node security team.">
<meta name="keywords" content="cybersecurity blog, threat intelligence, CVE alerts, NIST compliance, penetration testing guides, security news">
<link rel="canonical" href="https://www.cyber-node.com/blog/">

<meta property="og:type" content="website">
<meta property="og:url" content="https://www.cyber-node.com/blog/">
<meta property="og:title" content="Security Intelligence Blog | Cyber-Node">
<meta property="og:description" content="Threat intel, CVE alerts, compliance guides, and how-tos from the Cyber-Node team.">
<meta property="og:image" content="https://www.cyber-node.com/images/og-preview.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/mobile.css">

<style>
  :root {
    --bg: #0e1f38;
    --bg2: #142840;
    --border: #2e5070;
    --accent: #00d4ff;
    --text: #e8f4ff;
    --muted: #90bcd8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Hero */
  .hero-wrap {
    position: relative;
    padding: 160px 20px 80px;
    text-align: center;
    background: linear-gradient(180deg, #1a3252 0%, #0e1f38 100%);
    border-bottom: 1px solid var(--border);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 45px 45px;
    mask-image: radial-gradient(circle, black, transparent 85%);
  }

  .hero-content { position: relative; z-index: 2; }
  .hero-content h1 { font-size: 48px; letter-spacing: -1px; margin-bottom: 10px; }
  .hero-content p { font-family: var(--mono); color: var(--muted); }

  /* Filter bar */
  .filter-bar {
    max-width: 1100px;
    margin: 40px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Blog grid */
  .blog-section {
    max-width: 1100px;
    margin: 50px auto 100px;
    padding: 0 20px;
  }

  #blog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 25px;
  }

  /* Blog cards */
  .blog-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
  }

  .blog-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,212,255,0.1);
  }

  .blog-card-meta {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
  }

  .blog-category {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid;
  }

  .blog-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .blog-card-title {
    font-size: 20px;
    margin: 0 0 12px;
    line-height: 1.3;
  }

  .blog-card-title a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }

  .blog-card-title a:hover { color: var(--accent); }

  .blog-card-desc {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    flex-grow: 1;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .blog-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(46,80,112,0.4);
    padding-top: 15px;
  }

  .blog-author {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .blog-read-more {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .blog-read-more:hover { text-shadow: 0 0 10px rgba(0,212,255,0.5); }

  /* CTA */
  .blog-cta {
    text-align: center;
    padding: 80px 20px;
    background: rgba(0,212,255,0.02);
    border-top: 1px solid var(--border);
  }

  .cn-btn {
    display: inline-block;
    padding: 14px 32px;
    font-family: var(--mono);
    font-weight: 700;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    letter-spacing: 1px;
    transition: 0.3s;
  }

  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-outline  { border: 1px solid var(--accent); color: var(--accent); }
  .cn-btn:hover { box-shadow: 0 0 20px rgba(0,212,255,0.4); }

  @media (max-width: 600px) {
    #blog-grid { grid-template-columns: 1fr; }
    .hero-content h1 { font-size: 32px; }
  }
</style>
</head>
<body>

<div id="navbar"></div>

<section class="hero-wrap">
  <div class="grid-lines"></div>
  <div class="hero-content">
    <div style="font-family:var(--mono);color:var(--accent);letter-spacing:5px;margin-bottom:10px;">[ INTEL_FEED ]</div>
    <h1>Security Intelligence</h1>
    <p>Threat alerts, CVE breakdowns, compliance guides, and platform updates.</p>
  </div>
</section>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterPosts(this, 'all')">All</button>
  <button class="filter-btn" onclick="filterPosts(this, 'Threat Intel')">Threat Intel</button>
  <button class="filter-btn" onclick="filterPosts(this, 'CVE Alerts')">CVE Alerts</button>
  <button class="filter-btn" onclick="filterPosts(this, 'Compliance')">Compliance</button>
  <button class="filter-btn" onclick="filterPosts(this, 'How-To')">How-To</button>
  <button class="filter-btn" onclick="filterPosts(this, 'Platform Updates')">Platform Updates</button>
</div>

<section class="blog-section">
  <div id="blog-grid">
    <!-- Posts rendered by blog.js -->
  </div>
</section>

<div class="blog-cta">
  <h2 style="margin-bottom:10px;">Ready to secure your infrastructure?</h2>
  <p style="font-family:var(--mono);color:var(--muted);margin-bottom:30px;">Run a free scan or book a consultation.</p>
  <div style="display:flex;justify-content:center;gap:15px;flex-wrap:wrap;">
    <a href="/tools/security-scan.html" class="cn-btn btn-primary">Run Free Scan</a>
    <a href="/contact.html" class="cn-btn btn-outline">Book Consultation</a>
  </div>
</div>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch("../components/navbar.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("navbar").innerHTML = html; })
    .catch(e => console.error("Nav:", e));

  fetch("../components/footer.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("footer").innerHTML = html; })
    .catch(e => console.error("Footer:", e));

  // Category filter
  function filterPosts(btn, category) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cards = document.querySelectorAll('.blog-card');
    cards.forEach(card => {
      const cat = card.querySelector('.blog-category')?.textContent.trim();
      card.style.display = (category === 'all' || cat === category) ? '' : 'none';
    });
  }
</script>
<!-- blog.js loaded last so window.CyberBlog is defined before we call it -->
<script src="../js/blog.js" onload="window.CyberBlog.renderBlogIndex('blog-grid')"></script>

</body>
</html>
