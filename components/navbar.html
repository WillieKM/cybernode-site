<!-- components/navbar.html -->
<style>
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999;
    padding: 0 40px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(14, 31, 56, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(46, 80, 112, 0.5);
    box-sizing: border-box;
  }

  .nav-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: #00d4ff;
    text-decoration: none;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .nav-logo span { color: #e8f4ff; }

  .nav-links {
    display: flex;
    gap: 30px;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #90bcd8;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: #00d4ff; }

  .nav-cta {
    background: #00d4ff;
    color: #0e1f38 !important;
    padding: 8px 18px;
    border-radius: 4px;
    font-weight: 700;
  }

  .nav-cta:hover { box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

  /* Hamburger toggle */
  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    background: none;
    border: none;
    z-index: 1002;
  }

  .nav-toggle span {
    display: block;
    width: 24px;
    height: 2px;
    background: #00d4ff;
    transition: 0.3s;
    border-radius: 2px;
  }

  .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Vercel + Plausible Analytics */
  /* ─────────────────────────────────────────────── */

  @media (max-width: 700px) {
    .navbar { padding: 0 20px; }

    .nav-toggle { display: flex; }

    .nav-links {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(14, 31, 56, 0.98);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 35px;
      z-index: 1001;
      font-size: 18px;
    }

    .nav-links.open { display: flex; }

    .nav-links a { font-size: 16px; }

    .nav-cta { padding: 12px 28px; font-size: 15px; }
  }
</style>

<nav class="navbar">
  <a href="/" class="nav-logo">CYBER<span>-NODE</span></a>

  <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" id="navLinks">
    <li><a href="/services.html">Services</a></li>
    <li><a href="/solutions/">Solutions</a></li>
    <li><a href="/tools/security-scan.html">Scanner</a></li>
    <li><a href="/pricing.html">Pricing</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/contact.html" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<!-- Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script defer data-domain="cyber-node.com" src="https://plausible.io/js/script.js"></script>

<!-- Hamburger toggle logic -->
<script>
  (function() {
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');

    if (!toggle || !links) return;

    toggle.addEventListener('click', function() {
      toggle.classList.toggle('open');
      links.classList.toggle('open');
      document.body.style.overflow = links.classList.contains('open') ? 'hidden' : '';
    });

    // Close menu when a link is clicked
    links.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        toggle.classList.remove('open');
        links.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  })();
</script>
