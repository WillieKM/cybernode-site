<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Risk Check | Cyber-Node</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.security-check{
padding:100px 20px;
text-align:center;
}

.security-form{
max-width:600px;
margin:40px auto;
display:grid;
gap:15px;
}

.security-form select,
.security-form input{
padding:12px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.1);
background:#0f172a;
color:white;
}

.score-result{
margin-top:30px;
font-size:20px;
color:#3b82f6;
}

</style>

</head>



<body>


<header class="navbar">

<div class="container">

<div class="logo">Cyber-Node</div>

<nav>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="pricing.html">Pricing</a>
<a href="case-studies.html">Case Studies</a>
<a href="dashboard.html">Dashboard</a>

</nav>

</div>

</header>



<section class="hero">

<div class="container">

<h1>Cybersecurity Risk Check</h1>

<p>
Answer a few quick questions to evaluate your organization's
cybersecurity posture.
</p>

</div>

</section>



<section class="security-check">

<div class="container">

<h2>Cyber-Node Security Score Tool</h2>

<div class="security-form">

<select id="industry">

<option value="">Select Industry</option>
<option value="10">Healthcare</option>
<option value="15">Government Contractor</option>
<option value="8">Technology</option>
<option value="12">Finance</option>
<option value="5">Other</option>

</select>


<select id="companySize">

<option value="">Company Size</option>
<option value="5">1-10 Employees</option>
<option value="10">11-50 Employees</option>
<option value="15">51-200 Employees</option>
<option value="20">200+ Employees</option>

</select>


<select id="monitoring">

<option value="">Security Monitoring</option>
<option value="20">No Monitoring</option>
<option value="10">Basic Monitoring</option>
<option value="0">Advanced SOC Monitoring</option>

</select>


<select id="compliance">

<option value="">Compliance Program</option>
<option value="20">None</option>
<option value="10">Partial</option>
<option value="0">Fully Implemented</option>

</select>


<input id="email" type="email" placeholder="Email to receive report">


<button onclick="calculateScore()" class="btn-primary">
Calculate Security Score
</button>

</div>



<div id="score-result" class="score-result"></div>

<button onclick="downloadReport()" class="btn-primary" id="downloadBtn" style="display:none;">
Download Security Report
</button>

</div>

</section>



<footer class="footer">

<div class="container">

<p>Cyber-Node © 2026</p>

</div>

</footer>



<script>

let latestScore = 0
let latestLevel = ""
let latestRecommendation = ""

function calculateScore(){

let industry = parseInt(document.getElementById("industry").value || 0)
let companySize = parseInt(document.getElementById("companySize").value || 0)
let monitoring = parseInt(document.getElementById("monitoring").value || 0)
let compliance = parseInt(document.getElementById("compliance").value || 0)

let risk = industry + companySize + monitoring + compliance
let score = 100 - risk

let level = "Low Risk"
let recommendation = "Security Monitoring"

if(score < 70){
level = "Moderate Risk"
recommendation = "Security Risk Assessment"
}

if(score < 50){
level = "High Risk"
recommendation = "Penetration Testing"
}

latestScore = score
latestLevel = level
latestRecommendation = recommendation

document.getElementById("score-result").innerHTML = `
<h3>Your Security Score: ${score}/100</h3>
<p><strong>Risk Level:</strong> ${level}</p>
<p><strong>Recommended Service:</strong> ${recommendation}</p>
`

document.getElementById("downloadBtn").style.display="inline-block"

}



function downloadReport(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(20)
doc.text("Cyber-Node Security Assessment Report",20,30)

doc.setFontSize(12)

doc.text("Security Score: " + latestScore + "/100",20,60)
doc.text("Risk Level: " + latestLevel,20,70)
doc.text("Recommended Service: " + latestRecommendation,20,80)

doc.text("Summary:",20,100)

doc.text(
"Based on your responses, Cyber-Node identified potential security risks within your organization's infrastructure. A full cybersecurity assessment is recommended to further evaluate vulnerabilities and compliance readiness.",
20,
110,
{maxWidth:160}
)

doc.save("CyberNode-Security-Report.pdf")

}

</script>



</body>

</html>
