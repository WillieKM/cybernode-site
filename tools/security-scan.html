<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Security Scanner | Cyber-Node</title>

<link rel="stylesheet" href="../css/style.css">

<style>

/* HERO */
.hero{
text-align:center;
padding:120px 20px 60px;
background:linear-gradient(135deg,#1e3a8a,#020617);
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:0.85;
}

/* SCANNER */
.scanner-section{
padding:60px 20px 100px;
}

.scanner-container{
max-width:750px;
margin:auto;
text-align:center;
}

/* EMAIL INPUT */
.email-box{
margin-bottom:20px;
}

.email-box input{
padding:14px;
width:300px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

/* INPUT */
.scanner-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

.scanner-box input{
padding:14px;
width:280px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

.scanner-box button{
padding:14px 20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

.scanner-box button:hover{
background:#2563eb;
}

/* RESULT */
.scan-result-card{
background:#111827;
padding:30px;
border-radius:12px;
text-align:left;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s;
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:20px;
}

.result-box{
background:#0f172a;
padding:15px;
border-radius:8px;
text-align:center;
}

/* LOADER */
.loader{
border:4px solid #1f2937;
border-top:4px solid #3b82f6;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* LOCK BOX */
.lock-box{
margin-top:25px;
padding:20px;
background:#0f172a;
border-radius:10px;
text-align:center;
}

.lock-box h4{
margin-bottom:10px;
}

/* CTA */
.btn-primary{
display:inline-block;
margin-top:10px;
background:#3b82f6;
padding:10px 18px;
border-radius:6px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<script>
fetch("../components/navbar.html")
.then(res => res.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});
</script>

<!-- HERO -->
<section class="hero">

<h1>Cyber Security Scanner</h1>

<p>Run a quick security analysis and uncover risks instantly.</p>

</section>

<!-- SCANNER -->
<section class="scanner-section">

<div class="scanner-container">

<!-- EMAIL -->
<div class="email-box">
<input type="email" id="userEmail" placeholder="Enter your email to unlock scan">
</div>

<!-- DOMAIN INPUT -->
<div class="scanner-box">
<input type="text" id="scanDomain" placeholder="example.com">
<button onclick="runScan()">Run Security Scan</button>
</div>

<!-- RESULTS -->
<div class="scan-result-card" id="scanResult">

<h3>Scan Results</h3>
<p style="opacity:0.6;">No scan performed yet.</p>

</div>

</div>

</section>

<!-- SCRIPT -->
<script>

function runScan(){

const email = document.getElementById("userEmail").value;
const domain = document.getElementById("scanDomain").value;

if(!email || !email.includes("@")){
alert("Enter a valid email");
return;
}

if(!domain){
alert("Enter a domain");
return;
}

/* SAVE LEAD */
let leads = JSON.parse(localStorage.getItem("cybernode_leads") || "[]");

leads.push({
email: email,
domain: domain,
date: new Date().toISOString()
});

localStorage.setItem("cybernode_leads", JSON.stringify(leads));

startScan(domain);

}

/* LOADING ANIMATION */
function startScan(domain){

let result = document.getElementById("scanResult");

result.innerHTML = `
<h3>Scanning ${domain}...</h3>
<div class="loader"></div>
<p style="text-align:center;margin-top:10px;">Analyzing vulnerabilities...</p>
`;

setTimeout(()=>{
finishScan(domain);
}, 1800);

}

/* RESULTS */
function finishScan(domain){

let result = document.getElementById("scanResult");

let score = Math.floor(Math.random()*30)+70;

let risk = "Low Risk";
let color = "#22c55e";

if(score < 80){
risk = "Moderate Risk";
color = "#f59e0b";
}

if(score < 60){
risk = "High Risk";
color = "#ef4444";
}

result.innerHTML = `
<h3>Security Report</h3>

<div class="result-grid">

<div class="result-box">
<p>Domain</p>
<h4>${domain}</h4>
</div>

<div class="result-box">
<p>Score</p>
<h4 style="color:${color};">${score}/100</h4>
</div>

<div class="result-box">
<p>Risk</p>
<h4 style="color:${color};">${risk}</h4>
</div>

</div>

<div class="lock-box">

<h4>🔒 Full Report Locked</h4>

<p style="opacity:0.7;">
Unlock vulnerabilities, open ports, and risk exposure details.
</p>

<a href="../checkout.html" class="btn-primary">
Unlock Full Report ($19)
</a>

</div>
`;

}

</script>

</body>
</html>
