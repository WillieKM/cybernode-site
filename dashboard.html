<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* BRIGHTER PALETTE */
    --bg:       #0f172a;       /* Lighter slate base */
    --bg2:      #1e293b;       /* Brighter card background */
    --bg3:      #334155;       /* Hover/Input state */
    --border:   rgba(255, 255, 255, 0.1);
    --accent:   #00f2ff;       /* Electric cyan */
    --red:      #ff4d6d;       /* Vibrant neon red */
    --orange:   #fbbf24;       /* Golden yellow-orange */
    --green:    #10b981;       /* Emerald green */
    --text:     #ffffff;       /* Pure white text */
    --muted:    #94a3b8;       /* Lighter muted text */
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    /* Subtle background glow */
    background-image: 
        radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 100% 100%, 30px 30px, 30px 30px;
  }

  /* ── UPDATED SIDEBAR ────────────────── */
  .sidebar {
    width: 220px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
  }

  .nav-link:hover { 
    color: #fff; 
    background: rgba(0, 242, 255, 0.1); 
    box-shadow: inset 4px 0 0 var(--accent);
  }

  .nav-link.active { 
    color: var(--accent); 
    background: rgba(0, 242, 255, 0.05); 
    border-left: 3px solid var(--accent);
    text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
  }

  /* ── UPDATED STAT CARDS ──────────────── */
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 242, 255, 0.4);
  }

  .stat-label {
    color: var(--accent); /* Labels now pop in cyan */
    font-weight: 600;
    filter: brightness(1.2);
  }

  .ring-num {
    color: #fff;
    text-shadow: 0 0 10px var(--accent);
  }

  /* ── PANELS ──────────────────── */
  .panel {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .panel-badge {
    background: var(--accent);
    color: #0f172a; /* Dark text on bright badge */
    font-weight: 800;
    border: none;
  }

  .threat-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    transition: 0.2s;
  }

  .threat-item:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.2);
  }

  /* ── ACTIVITY LOG ───────────── */
  #activityLog li {
    background: rgba(255, 255, 255, 0.03);
    color: #cbd5e1;
    border-left: 2px solid var(--accent);
  }

  /* ── CHART OVERRIDE ──────────────────── */
  /* (Make sure to update the JS chart colors to match these new vars) */
</style>
